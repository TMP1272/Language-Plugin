name: Build aapt2 with CMake

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-aapt2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 curl unzip git openjdk-17-jdk

      - name: Cache Android NDK r29
        uses: actions/cache@v4
        with:
          path: $HOME/android-ndk-r29
          key: ndk-r29

      - name: Set up Android NDK r29
        run: |
          if [ ! -d "$HOME/android-ndk-r29" ]; then
            curl -L https://dl.google.com/android/repository/android-ndk-r29-linux.zip -o ndk.zip
            unzip ndk.zip -d $HOME
          fi
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r29" >> $GITHUB_ENV

      - name: Clone AOSP repos needed for aapt2
        run: |
          mkdir aosp && cd aosp
          git clone --branch master --depth 1 https://android.googlesource.com/platform/frameworks/base frameworks/base
          git clone --branch master --depth 1 https://android.googlesource.com/platform/frameworks/native frameworks/native
          git clone --branch master --depth 1 https://android.googlesource.com/platform/system/core system/core
          mv frameworks/base/tools/aapt2 ../aapt2-src

      - name: Add CMakeLists.txt for aapt2
        run: |
          cat <<'EOF' > aapt2-src/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22)
          project(aapt2 LANGUAGES CXX)

          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)

          # libcutils
          file(GLOB_RECURSE CUTILS_SOURCES ../system/core/libcutils/*.c ../system/core/libcutils/*.cpp)
          add_library(cutils STATIC ${CUTILS_SOURCES})
          target_include_directories(cutils PUBLIC ../system/core/include ../system/core/libcutils)

          # libziparchive
          file(GLOB_RECURSE ZIPARCHIVE_SOURCES ../system/core/libziparchive/*.cpp)
          add_library(ziparchive STATIC ${ZIPARCHIVE_SOURCES})
          target_include_directories(ziparchive PUBLIC ../system/core/include ../system/core/libziparchive/include)

          # libutils
          file(GLOB_RECURSE UTILS_SOURCES ../system/core/libutils/*.cpp)
          add_library(utils STATIC ${UTILS_SOURCES})
          target_include_directories(utils PUBLIC ../system/core/include ../system/core/libutils)

          # liblog
          file(GLOB_RECURSE LOG_SOURCES ../system/core/liblog/*.cpp)
          add_library(log STATIC ${LOG_SOURCES})
          target_include_directories(log PUBLIC ../system/core/include ../system/core/liblog)

          # libandroidfw
          file(GLOB_RECURSE ANDROIDFW_SOURCES ../frameworks/base/libs/androidfw/*.cpp)
          add_library(androidfw STATIC ${ANDROIDFW_SOURCES})
          target_include_directories(androidfw PUBLIC ../frameworks/base/libs/androidfw/include ../frameworks/base/libs/androidfw)

          # libaapt2
          set(TOOL_SOURCES
              cmd/ApkInfo.cpp cmd/Command.cpp cmd/Compile.cpp cmd/Convert.cpp
              cmd/Diff.cpp cmd/Dump.cpp cmd/Link.cpp cmd/Optimize.cpp cmd/Util.cpp
          )
          file(GLOB_RECURSE AAPT2_SOURCES
              compile/*.cpp configuration/*.cpp dump/*.cpp filter/*.cpp
              format/**/*.cpp io/*.cpp link/*.cpp optimize/*.cpp process/*.cpp
              split/*.cpp text/*.cpp util/*.cpp java/*.cpp xml/*.cpp
              Debug.cpp DominatorTree.cpp LoadedApk.cpp Resource*.cpp
              SdkConstants.cpp ValueTransformer.cpp
          )
          add_library(libaapt2 STATIC ${AAPT2_SOURCES})
          target_include_directories(libaapt2 PRIVATE
              ${CMAKE_CURRENT_SOURCE_DIR}
              ../native/include
              ../system/core/include
              ../frameworks/base/libs/androidfw/include
          )
          target_link_libraries(libaapt2
              androidfw utils log cutils ziparchive expat png base protobuf z
          )

          # aapt2 binary
          add_executable(aapt2 Main.cpp ${TOOL_SOURCES})
          target_link_libraries(aapt2 libaapt2)
          EOF

      - name: Configure build for arm64-v8a
        run: |
          mkdir -p build-arm64
          cd build-arm64
          cmake ../aapt2-src \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -GNinja

      - name: Build aapt2
        run: |
          cd build-arm64
          ninja aapt2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-arm64-v8a
          path: build-arm64/aapt2
