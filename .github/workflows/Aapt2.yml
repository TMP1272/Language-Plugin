name: Build aapt2 arm64-v8a

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-aapt2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 curl unzip

      - name: Set up Android NDK
        run: |
          export ANDROID_NDK_VERSION=r26d
          curl -L https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip -o ndk.zip
          unzip ndk.zip -d $HOME
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Download aapt2 9.2.1 binary
        run: |
          mkdir -p tools/aapt2
          curl -L https://dl.google.com/android/maven2/com/android/tools/build/aapt2/9.2.1/aapt2-9.2.1-linux.zip -o tools/aapt2/aapt2.zip
          unzip tools/aapt2/aapt2.zip -d tools/aapt2
          chmod +x tools/aapt2/aapt2
          tools/aapt2/aapt2 version

      - name: Configure build for arm64-v8a
        run: |
          mkdir -p build-arm64
          cd build-arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -GNinja

      - name: Build aapt2
        run: |
          cd build-arm64
          ninja aapt2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-arm64-v8a-9.2.1
          path: build-arm64/aapt2
