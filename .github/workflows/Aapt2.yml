name: Build aapt2 arm64-v8a

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-aapt2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 unzip curl

      - name: Download aapt2 9.2.1
        run: |
          mkdir -p tools/aapt2
          curl -L https://dl.google.com/dl/android/maven2/com/android/tools/build/aapt2/9.2.1/aapt2-9.2.1-linux.jar -o tools/aapt2/aapt2.jar
          unzip tools/aapt2/aapt2.jar -d tools/aapt2

      - name: Configure build
        run: |
          mkdir -p build-arm64
          cd build-arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../path/to/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -GNinja

      - name: Build aapt2
        run: |
          cd build-arm64
          ninja aapt2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-arm64-v8a-9.2.1
          path: build-arm64/aapt2
