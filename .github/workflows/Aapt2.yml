name: Build aapt2 arm64-v8a

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-aapt2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 curl unzip openjdk-17-jdk

      - name: Cache Android NDK r29
        uses: actions/cache@v4
        with:
          path: $HOME/android-ndk-r29
          key: ndk-r29

      - name: Set up Android NDK r29
        run: |
          if [ ! -d "$HOME/android-ndk-r29" ]; then
            curl -L https://dl.google.com/android/repository/android-ndk-r29-linux.zip -o ndk.zip
            unzip ndk.zip -d $HOME
          fi
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r29" >> $GITHUB_ENV

      - name: Download and extract aapt2 9.2.1 binary
        run: |
          mkdir -p tools/aapt2
          curl -L https://dl.google.com/android/maven2/com/android/tools/build/aapt2/9.2.1-15009934/aapt2-9.2.1-15009934-linux.jar -o tools/aapt2/aapt2.jar
          cd tools/aapt2
          jar xf aapt2.jar
          # tìm file thực thi aapt2 trong JAR
          AAPT2_PATH=$(find . -type f -name aapt2 | head -n 1)
          if [ -z "$AAPT2_PATH" ]; then
            echo "Không tìm thấy binary aapt2 trong JAR!"
            exit 1
          fi
          if [ "$AAPT2_PATH" != "./aapt2" ]; then
            cp "$AAPT2_PATH" ./aapt2
          fi
          chmod +x ./aapt2
          ./aapt2 version

      - name: Configure build for arm64-v8a
        run: |
          mkdir -p build-arm64
          cd build-arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -GNinja

      - name: Build aapt2
        run: |
          cd build-arm64
          ninja aapt2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-arm64-v8a-9.2.1
          path: build-arm64/aapt2
