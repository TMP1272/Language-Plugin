name: Build aapt2 with Soong

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-aapt2:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk git make python3 curl unzip

      - name: Clone minimal AOSP repos (main branch only)
        run: |
          mkdir aosp && cd aosp
          git clone --branch master --depth 1 https://android.googlesource.com/platform/build/soong build/soong
          git clone --branch master --depth 1 https://android.googlesource.com/platform/build/ build
          git clone --branch master --depth 1 https://android.googlesource.com/platform/frameworks/base frameworks/base
          git clone --branch master --depth 1 https://android.googlesource.com/platform/frameworks/native frameworks/native
          git clone --branch master --depth 1 https://android.googlesource.com/platform/system/core system/core

      - name: Bootstrap Soong
        run: |
          cd aosp
          build/soong/soong_ui.bash --make-mode --skip-ninja bootstrap

      - name: Build aapt2 with Soong
        run: |
          cd aosp
          build/soong/soong_ui.bash --make-mode aapt2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-arm64-v8a
          path: aosp/out/soong/.intermediates/frameworks/base/tools/aapt2/aapt2/android_arm64_armv8-a_shared/aapt2
