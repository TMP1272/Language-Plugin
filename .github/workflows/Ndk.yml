name: Build Android NDK ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ndk:
    runs-on: ubuntu-latest  # Dùng ubuntu-latest thay vì 22.04
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Nếu có submodules

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          local-cache: true
      
      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.28.1
      
      - name: Build for ARM64 Android
        run: |
          # Tạo thư mục build
          mkdir -p build/arm64-v8a
          cd build/arm64-v8a
          
          # Build với NDK toolchain
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DLLVM_BUILD_TOOLS=OFF \
            -DLLVM_INCLUDE_TESTS=OFF
          
          # Build
          cmake --build . --parallel $(nproc)
      
      - name: List built files
        run: |
          echo "Built files:"
          find build/arm64-v8a -name "*.so" -o -name "*.a" | head -20
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-binaries
          path: |
            build/arm64-v8a/*.so
            build/arm64-v8a/*.a
            build/arm64-v8a/lib/*.so 2>/dev/null || true
