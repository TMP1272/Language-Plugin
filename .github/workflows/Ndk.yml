name: Build Android NDK ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ndk:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        run: |
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-venv python3.11-dev
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 2
          python3 --version

      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            libc++-dev bison ninja-build cmake python3-pip curl

      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo

      - name: Init repo
        run: |
          mkdir -p $GITHUB_WORKSPACE/android-src
          cd $GITHUB_WORKSPACE/android-src
          repo init -u https://android.googlesource.com/platform/manifest -b llvm-toolchain
          repo sync -c

      - name: Fix python symlinks
        run: |
          cd $GITHUB_WORKSPACE/android-src/prebuilts/python
          sudo rm -rf linux-arm64
          sudo ln -s /usr linux-arm64
          cd $GITHUB_WORKSPACE/android-src/prebuilts/build-tools/path
          sudo rm -rf linux-arm64
          sudo ln -s /usr linux-arm64
          cd $GITHUB_WORKSPACE/android-src/prebuilts/build-tools/path/linux-arm64
          sudo rm -f python3
          sudo ln -s /usr/bin/python3 python3

      - name: Apply ARM64 patches with sed
        run: |
          cd $GITHUB_WORKSPACE/android-src/toolchain/llvm_android
          sed -i 's/linux-x86/linux-arm64/g' py3_utils.py
          sed -i 's/linux-x86/linux-arm64/g' src/llvm_android/hosts.py
          sed -i '/CMAKE_BUILD_TYPE.*Debug/a \        else:\n            defines["CMAKE_BUILD_TYPE"] = "Release"' src/llvm_android/builders.py
          sed -i 's/x86_64-linux/aarch64-linux/g' src/llvm_android/configs.py
          sed -i 's/x86_64-unknown-linux-gnu/aarch64-unknown-linux-gnu/g' src/llvm_android/configs.py
          sed -i 's/\/ constants.CLANG_PREBUILT_VERSION//g' src/llvm_android/paths.py
          sed -i 's/libxml2_builder.build()/# libxml2_builder.build()/g' do_build.py
          sed -i 's/xz_builder.build()/# xz_builder.build()/g' do_build.py
          sed -i 's/set_default_toolchain(stage1.installed_toolchain)/set_default_toolchain(toolchains.Toolchain(Path(\"\/usr\"),Path(\"\/usr\")))/g' do_build.py
          # patch clang host paths từ linux-x86 sang linux-arm64
          sed -i 's/clang\/host\/linux-x86/clang\/host\/linux-arm64/g' src/llvm_android/paths.py
          sed -i 's/linux-x86/linux-arm64/g' src/llvm_android/configs.py
          # patch cmake/ninja paths
          sed -i 's/cmake\/linux-x86/cmake\/linux-arm64/g' src/llvm_android/paths.py
          sed -i 's/ninja\/linux-x86/ninja\/linux-arm64/g' src/llvm_android/paths.py

      - name: Symlink system cmake/ninja/clang
        run: |
          mkdir -p $GITHUB_WORKSPACE/android-src/prebuilts/cmake/linux-arm64/bin
          mkdir -p $GITHUB_WORKSPACE/android-src/prebuilts/ninja/linux-arm64
          mkdir -p $GITHUB_WORKSPACE/android-src/prebuilts/clang/host/linux-arm64/bin

          ln -sf /usr/bin/cmake $GITHUB_WORKSPACE/android-src/prebuilts/cmake/linux-arm64/bin/cmake
          ln -sf /usr/bin/ninja $GITHUB_WORKSPACE/android-src/prebuilts/ninja/linux-arm64/ninja
          ln -sf /usr/bin/clang $GITHUB_WORKSPACE/android-src/prebuilts/clang/host/linux-arm64/bin/clang
          ln -sf /usr/bin/clang++ $GITHUB_WORKSPACE/android-src/prebuilts/clang/host/linux-arm64/bin/clang++
          ln -sf /usr/bin/ld.lld $GITHUB_WORKSPACE/android-src/prebuilts/clang/host/linux-arm64/bin/ld.lld

      - name: Build toolchain
        run: |
          cd $GITHUB_WORKSPACE/android-src
          python3 toolchain/llvm_android/build.py --no-build windows --skip-tests --no-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndk-arm64
          path: $GITHUB_WORKSPACE/android-src/out/stage2
